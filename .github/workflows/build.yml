name: Build Noor AI APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Cordova and Build Noor AI App
        run: |
          npm install -g cordova
          cordova create noor_app com.app.app "تطبيق اسلامي"
          cd noor_app
          cordova platform add android
          cordova plugin add cordova-plugin-inappbrowser
          mkdir -p res
          if [ -f ../.github/workflows/icon.png ]; then cp ../.github/workflows/icon.png res/icon.png; fi
          echo '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"></vector>' > res/transparent_splash.xml
          
          echo '<widget id="com.app.app" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">' > config.xml
          echo '    <name>تطبيق اسلامي</name>' >> config.xml
          echo '    <description>HTML App</description>' >> config.xml
          echo '    <author>Noor AI Team</author>' >> config.xml
          echo '    <content src="index.html" />' >> config.xml
          echo '    <access origin="*" />' >> config.xml
          echo '    <allow-navigation href="*" />' >> config.xml
          echo '    <allow-intent href="http://*/*" />' >> config.xml
          echo '    <allow-intent href="https://*/*" />' >> config.xml
          echo '    <preference name="Orientation" value="portrait" />' >> config.xml
          echo '    <preference name="loadUrlTimeoutValue" value="300000" />' >> config.xml
          echo '    <preference name="AndroidWindowSplashScreenBackground" value="#0f0f0f" />' >> config.xml
          echo '    <preference name="AndroidWindowSplashScreenAnimatedIcon" value="res/transparent_splash.xml" />' >> config.xml
          echo '    <preference name="AndroidWindowSplashScreenIconBackgroundColor" value="#0f0f0f" />' >> config.xml
          echo '    <platform name="android"><icon src="res/icon.png" /></platform>' >> config.xml
          echo '</widget>' >> config.xml
          
          # نسخ ملف HTML من المسار الصحيح (تم رفعه في جذر المستودع)
          cp ../index.html www/index.html
          
          cordova build android --device
      - name: Upload Noor AI APK
        uses: actions/upload-artifact@v4
        with:
          name: app-App
          path: noor_app/platforms/android/app/build/outputs/apk/debug/*.apk
